services:
  postgres:
    image: postgres:15-alpine
    container_name: bahamut-postgres-dev
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_DB: ${DB_NAME:-bahamut_oms}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/migrations:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: bahamut-backend-dev
    environment:
      NODE_ENV: development
      DB_USER: ${DB_USER:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-postgres}
      DB_HOST: postgres
      DB_NAME: ${DB_NAME:-bahamut_oms}
      DB_PORT: 5432
      JWT_SECRET: ${JWT_SECRET:-dev-secret-key-change-in-production}
      PORT: 5000
    ports:
      - "5000:5000"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./backend/src:/app/src
      - ./backend/migrations:/app/migrations
    command: npm start

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    container_name: bahamut-frontend-dev
    ports:
      - "80:80"
    depends_on:
      - backend
    environment:
      VITE_API_URL: /api
      VITE_GOOGLE_CLIENT_ID: ${VITE_GOOGLE_CLIENT_ID:-your-google-client-id}

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: bahamut-pgadmin-dev
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL:-admin@example.com}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD:-admin}
    ports:
      - "5050:80"
    depends_on:
      - postgres

volumes:
  postgres_data:

networks:
  default:
    name: bahamut-network
