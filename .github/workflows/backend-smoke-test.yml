name: Backend Smoke Test

on:
  push:
    branches:
      - main
      - master
    paths:
      - 'backend/**'
      - '.github/workflows/backend-smoke-test.yml'
  pull_request:
    paths:
      - 'backend/**'
      - '.github/workflows/backend-smoke-test.yml'
  workflow_dispatch:

jobs:
  smoke-tests:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run billing and BI smoke tests
        run: npm run test:smoke
