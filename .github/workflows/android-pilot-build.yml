name: Android Pilot Build

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Config profile to bundle (staging or production)'
        required: true
        default: staging
        type: choice
        options:
          - staging
          - production

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read

jobs:
  build-android-apk:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Install Android shell dependencies
        working-directory: android
        run: npm ci

      - name: Sync web assets (staging)
        if: github.event.inputs.environment == 'staging'
        working-directory: android
        run: npm run sync:staging

      - name: Sync web assets (production)
        if: github.event.inputs.environment == 'production'
        working-directory: android
        run: npm run sync:production

      - name: Make Gradle wrapper executable
        working-directory: android/native
        run: chmod +x gradlew

      - name: Build debug APK
        working-directory: android/native
        run: ./gradlew assembleDebug --no-daemon

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-debug-apk-${{ github.event.inputs.environment }}
          path: android/native/app/build/outputs/apk/debug/app-debug.apk
