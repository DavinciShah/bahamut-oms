# Winget package manifest for De Vibe OMS Windows desktop installer.
#
# PackageUrl  — direct URL to the Win32 NSIS installer package for Store checks
# InstallerUrl — direct download URL for the Win32 NSIS installer produced by
#                `npm run dist:win` (De-Vibe-OMS-Setup-1.0.0.exe).
#
# Before submitting to the winget community repo:
#   1. Upload the .exe to a direct hot-link URL that returns HTTP 200 (no redirects).
#   2. Replace InstallerSha256 with the real SHA-256 of the uploaded installer:
#        shasum -a 256 De-Vibe-OMS-Setup-1.0.0.exe   (macOS/Linux)
#        CertUtil -hashfile De-Vibe-OMS-Setup-1.0.0.exe SHA256   (Windows)

